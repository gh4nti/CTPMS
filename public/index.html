<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>User Directory</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<main class="app-shell">
			<section class="hero-card">
				<div class="hero-copy">
					<p class="eyebrow">SQLite + Express</p>
					<h1>User Directory</h1>
					<p class="lede">
						A simple place to collect names, keep them organized,
						and grow into a full admin tool.
					</p>
				</div>

				<form id="user-form" class="user-form">
					<label class="field-label" for="name">Name</label>
					<div class="field-row">
						<input
							type="text"
							id="name"
							name="name"
							placeholder="Enter a name"
							autocomplete="off"
						/>
						<button type="submit">Add user</button>
					</div>
					<p id="status" class="status" aria-live="polite"></p>
				</form>
			</section>

			<section class="list-card" aria-labelledby="list-title">
				<div class="list-header">
					<h2 id="list-title">Current users</h2>
					<span id="count" class="count">0 users</span>
				</div>
				<ul id="list" class="user-list"></ul>
			</section>
		</main>

		<script src="script.js"></script>
	</body>
</html>
